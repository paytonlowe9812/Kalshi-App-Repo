# Uploads a source ZIP as a workflow artifact on every push to main.
# Download: Repository -> Actions -> this workflow -> latest run -> Artifacts.
# Artifacts expire per retention-days (GitHub also enforces account/org limits).

name: Main branch ZIP artifact

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

jobs:
  zip-artifact:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Create ZIP from repository tree
        run: |
          git archive --format=zip --output=PredictionMarketApp-main.zip HEAD
          ls -la PredictionMarketApp-main.zip

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: PredictionMarketApp-main
          path: PredictionMarketApp-main.zip
          if-no-files-found: error
          retention-days: 90
