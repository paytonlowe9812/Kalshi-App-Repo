# Single rolling release: tag `latest`, name "Latest".
# Rebuilds platform archives on every push to `main` and replaces all previous releases.
#
# Assets (stable names for releases/latest/download/...):
#   PredictionMarketApp-Windows.zip
#   PredictionMarketApp-macOS.tar.gz
#   PredictionMarketApp-Linux.tar.gz
# Each archive adds .release-platform (windows | macOS | linux) so GitHub keeps all three.

name: Release source archives (Windows / macOS / Linux)

on:
  push:
    branches:
      - main

concurrency:
  group: rolling-release
  cancel-in-progress: true

permissions:
  contents: write

jobs:
  attach-archives:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Delete existing releases (keep one rolling Latest)
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set +e
          gh release list --limit 200 --json tagName -q '.[].tagName' | while IFS= read -r tag; do
            [ -z "$tag" ] && continue
            echo "Removing release: $tag"
            gh release delete "$tag" --yes --cleanup-tag 2>/dev/null || true
          done

      - name: Build OS-labeled archives
        run: |
          set -eux
          VERSION="latest"
          PREFIX="PredictionMarketApp-${VERSION}"
          WS="${GITHUB_WORKSPACE}"

          WORK="$(mktemp -d)"
          git archive HEAD PredictionMarketApp | tar -x -C "${WORK}"
          echo windows > "${WORK}/PredictionMarketApp/.release-platform"
          (cd "${WORK}" && zip -rq "${WS}/${PREFIX}-Windows.zip" PredictionMarketApp)
          cp "${WS}/${PREFIX}-Windows.zip" "${WS}/PredictionMarketApp-Windows.zip"
          rm -rf "${WORK}"

          WORK="$(mktemp -d)"
          git archive HEAD PredictionMarketApp | tar -x -C "${WORK}"
          echo macOS > "${WORK}/PredictionMarketApp/.release-platform"
          (cd "${WORK}" && tar -czf "${WS}/${PREFIX}-macOS.tar.gz" PredictionMarketApp)
          cp "${WS}/${PREFIX}-macOS.tar.gz" "${WS}/PredictionMarketApp-macOS.tar.gz"
          rm -rf "${WORK}"

          WORK="$(mktemp -d)"
          git archive HEAD PredictionMarketApp | tar -x -C "${WORK}"
          echo linux > "${WORK}/PredictionMarketApp/.release-platform"
          (cd "${WORK}" && tar -czf "${WS}/${PREFIX}-Linux.tar.gz" PredictionMarketApp)
          cp "${WS}/${PREFIX}-Linux.tar.gz" "${WS}/PredictionMarketApp-Linux.tar.gz"
          rm -rf "${WORK}"

          ls -la "${WS}/${PREFIX}"-*.zip "${WS}/${PREFIX}"-*.tar.gz \
            "${WS}/PredictionMarketApp-Windows.zip" \
            "${WS}/PredictionMarketApp-macOS.tar.gz" \
            "${WS}/PredictionMarketApp-Linux.tar.gz"

      - name: Publish Latest release
        uses: softprops/action-gh-release@153bb8e04406b158c6c84fc1615b65b24149a1fe
        with:
          tag_name: latest
          name: Latest
          target_commitish: ${{ github.sha }}
          body: |
            Rolling build from `main` at [`${{ github.sha }}`](https://github.com/${{ github.repository }}/commit/${{ github.sha }}).
          files: |
            PredictionMarketApp-Windows.zip
            PredictionMarketApp-macOS.tar.gz
            PredictionMarketApp-Linux.tar.gz
            PredictionMarketApp-*-Windows.zip
            PredictionMarketApp-*-macOS.tar.gz
            PredictionMarketApp-*-Linux.tar.gz
          draft: false
          prerelease: false
          make_latest: true
