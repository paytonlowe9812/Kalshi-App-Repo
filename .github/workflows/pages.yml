# Monorepo: app lives in PredictionMarketApp/. Pages URL uses THIS repo name:
# https://<owner>.github.io/Kalshi-App-Repo/
# One-time: Settings -> Pages -> Source: GitHub Actions

name: Deploy Pages

on:
  push:
    branches:
      - main
    paths:
      - 'PredictionMarketApp/**'
      - '.github/workflows/pages.yml'
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure Pages
        uses: actions/configure-pages@v4

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: PredictionMarketApp/docs

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
